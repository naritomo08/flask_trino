<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PHP Trino Iceberg Log Search</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div>
          <p class="eyebrow">PHP Trino Iceberg Log Search</p>
          <h1>ログのキーワード検索</h1>
          <p class="note">検索対象日は JST の当日です。条件に一致したログのうち最新<?= h((string) $defaultLimit) ?>件のみ表示します。</p>
        </div>
      </section>

      <form id="search-form" class="search" method="post" action="/">
        <label>
          <span>TIME From (JST)</span>
          <input type="time" name="time_from" value="<?= h($filters['time_from']) ?>">
        </label>
        <label>
          <span>TIME To (JST)</span>
          <input type="time" name="time_to" value="<?= h($filters['time_to']) ?>">
        </label>
        <label>
          <span>LOG</span>
          <select name="log_type">
            <option value="">すべて</option>
            <?php foreach ($options['log_types'] as $logType): ?>
              <option value="<?= h($logType) ?>" <?= $filters['log_type'] === $logType ? 'selected' : '' ?>><?= h($logType) ?></option>
            <?php endforeach; ?>
          </select>
        </label>
        <label>
          <span>HOST</span>
          <input type="search" name="host" value="<?= h($filters['host']) ?>" placeholder="例: elastic1, flink1" aria-label="Host">
        </label>
        <label>
          <span>PROGRAM</span>
          <input type="search" name="program" value="<?= h($filters['program']) ?>" placeholder="例: sshd, systemd, hdfs" aria-label="Program">
        </label>
        <label class="message-filter">
          <span>Message</span>
          <input type="search" name="message" value="<?= h($filters['message']) ?>" placeholder="例: accepted, JournalNodeSyncer" aria-label="Message" autofocus>
        </label>
        <div class="search-actions">
          <a class="reset-link" href="/clear">クリア</a>
          <button type="submit">検索</button>
        </div>
      </form>

      <section id="results" class="results" aria-live="polite">
        <div id="results-summary" class="summary">
          <?php if ($searched): ?>
            <span><?= h((string) count($logs)) ?> 件</span>
            <span>最新<?= h((string) $defaultLimit) ?>件のみ表示</span>
          <?php else: ?>
            <span>検索を実施してください</span>
          <?php endif; ?>
        </div>

        <?php if (!$searched): ?>
          <p id="results-body" class="empty">検索条件を入力して検索ボタンを押してください。</p>
        <?php elseif ($logs): ?>
          <div id="results-body" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Log</th>
                  <th>Host</th>
                  <th>Program</th>
                  <th>Message</th>
                </tr>
              </thead>
              <tbody>
                <?php foreach ($logs as $log): ?>
                  <?php $logType = (string) ($log['log_type'] ?? 'unknown'); ?>
                  <tr>
                    <td><?= h($log['display_time'] ?? '') ?></td>
                    <td><span class="log-type log-type-<?= h($logType) ?>"><?= h($logType) ?></span></td>
                    <td><?= h($log['host'] ?? '') ?></td>
                    <td><?= h($log['program'] ?? '') ?></td>
                    <td><?= h($log['msg'] ?? '') ?></td>
                  </tr>
                <?php endforeach; ?>
              </tbody>
            </table>
          </div>
        <?php else: ?>
          <p id="results-body" class="empty">該当するログはありません。</p>
        <?php endif; ?>
      </section>
    </main>
    <script src="/static/search.js"></script>
  </body>
</html>
