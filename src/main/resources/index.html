<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Java Trino Iceberg Log Search</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div>
          <p class="eyebrow">Java Trino Iceberg Log Search</p>
          <h1>ログのキーワード検索</h1>
          <p class="note">検索対象日は JST の当日です。条件に一致したログのうち最新50件のみ表示します。</p>
        </div>
      </section>
      <form id="search-form" class="search" method="post" action="/">
        <label><span>TIME From (JST)</span><input type="time" name="time_from" value="{{timeFrom}}"></label>
        <label><span>TIME To (JST)</span><input type="time" name="time_to" value="{{timeTo}}"></label>
        <label><span>LOG</span><select name="log_type"><option value="">すべて</option>
          {{logTypeOptions}}
        </select></label>
        <label><span>HOST</span><input type="search" name="host" value="{{host}}" placeholder="例: trino1, flink1" aria-label="Host"></label>
        <label><span>PROGRAM</span><input type="search" name="program" value="{{program}}" placeholder="例: sshd, systemd, hdfs" aria-label="Program"></label>
        <label class="message-filter"><span>Message</span><input type="search" name="message" value="{{message}}" placeholder="例: accepted, JournalNodeSyncer" aria-label="Message" autofocus></label>
        <div class="search-actions"><a class="reset-link" href="/clear">クリア</a><button type="submit">検索</button></div>
      </form>
      <section id="results" class="results" aria-live="polite">
        <div id="results-summary" class="summary">{{resultsSummary}}</div>
        {{resultsBody}}
      </section>
    </main>
    <script src="/static/search.js"></script>
  </body>
</html>
